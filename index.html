<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <title>Video Generator - Pexels API</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/umd/ffmpeg.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; }
        .api-key-section { background: #1a1a2e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .api-key-section input { width: 70%; padding: 10px; border: none; border-radius: 5px; background: #16213e; color: #fff; }
        .api-key-section button { padding: 10px 20px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .segments-container { background: #1a1a2e; padding: 20px; border-radius: 10px; }
        .segment { display: flex; gap: 10px; padding: 10px; background: #16213e; margin-bottom: 10px; border-radius: 5px; align-items: center; }
        .segment-num { width: 30px; text-align: center; font-weight: bold; color: #00d4ff; }
        .segment-time { width: 120px; font-family: monospace; }
        .segment-query { flex: 1; }
        .segment-status { width: 150px; text-align: center; }
        .status-searching { color: #ffa500; }
        .status-downloading { color: #00d4ff; }
        .status-ready { color: #00ff00; }
        .status-error { color: #ff4444; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #00ff00; color: #000; }
        .btn-danger { background: #ff4444; color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-container { margin-top: 20px; }
        .progress-bar { width: 100%; height: 30px; background: #16213e; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff00); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 10px; }
        .log-container { background: #0a0a15; padding: 15px; border-radius: 5px; margin-top: 20px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .log-entry { margin-bottom: 5px; }
        .log-info { color: #00d4ff; }
        .log-success { color: #00ff00; }
        .log-error { color: #ff4444; }
        .log-warning { color: #ffa500; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .stat-box { background: #16213e; padding: 15px; border-radius: 5px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 12px; color: #888; }
        .video-preview { margin-top: 20px; }
        .video-preview video { width: 100%; max-width: 800px; display: block; margin: 0 auto; border-radius: 10px; }
        .error-details { background: #2a1a1a; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Generator - Pexels API</h1>
        
        <div class="api-key-section">
            <h3>Pexels API Key:</h3>
            <input type="text" id="apiKey" placeholder="Masukkan Pexels API Key Anda">
            <button onclick="saveApiKey()">Simpan</button>
            <span id="apiKeyStatus" style="margin-left: 10px; color: #00ff00;"></span>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="startGeneration()">Mulai Generate Video</button>
            <button class="btn btn-danger" onclick="resetAll()">Reset Semua</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="totalSegments">41</div>
                <div class="stat-label">Total Segmen</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="readySegments">0</div>
                <div class="stat-label">Siap</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="processingSegments">0</div>
                <div class="stat-label">Diproses</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="errorSegments">0</div>
                <div class="stat-label">Error</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Menunggu...</div>
        </div>

        <div class="segments-container" id="segmentsContainer"></div>

        <div class="log-container" id="logContainer"></div>

        <div class="video-preview" id="videoPreview" style="display: none;">
            <h3>Video Hasil:</h3>
            <video id="outputVideo" controls></video>
            <a id="downloadLink" class="btn btn-success" style="display: inline-block; margin-top: 10px;" download>Download Video</a>
        </div>
    </div>

    <script>
        // Check if FFmpeg is loaded
        console.log('FFmpeg loaded:', typeof FFmpeg);
        
        // For version 0.11.x, access via window.FFmpeg
        const FFmpeg = window.FFmpeg;
        const fetchFile = async (file) => {
            if (file instanceof Blob || file instanceof File) {
                return new Uint8Array(await file.arrayBuffer());
            }
            return file;
        };

        let ffmpeg = null;
        let apiKey = localStorage.getItem('pexelsApiKey') || '';
        let segments = [];
        let isProcessing = false;

        // Parse format dari audio.html
        const rawData = `1	00:00–00:08	welcome intro dark background
2	00:08–00:25	two office buildings corporate
3	00:25–00:50	customers queue store excited / empty store sale discount
4	00:50–01:15	business book reading desk
5	01:15–01:40	leader inspiring team meeting
6	01:40–02:00	vintage airplane flying / retro computer technology
7	02:00–02:15	human brain neurons science
8	02:15–02:55	car factory assembly line workers
9	02:55–03:15	engineer blueprint design precision
10	03:15–03:40	price tag discount retail store
11	03:40–03:55	car dealership showroom promotion
12	03:55–04:25	confused person reading document frustrated
13	04:25–04:50	fear anxiety worried person dark
14	04:50–05:15	old mobile phone flip phone technology
15	05:15–05:35	supermarket shelf too many choices confused
16	05:35–05:55	stock market chart rise fall crash
17	05:55–06:25	customer shopping bargain / loyal customer brand love
18	06:25–07:00	concentric circles diagram whiteboard
19	07:00–07:30	brain scan neural activity neuroscience
20	07:30–07:55	couple falling in love connection
21	07:55–08:35	awkward date restaurant / genuine conversation cafe date
22	08:35–09:10	apple store products technology modern
23	09:10–09:25	apple products iphone macbook technology
24	09:25–10:10	wright brothers airplane vintage aviation
25	10:10–10:35	team resilience failure to success motivation
26	10:35–10:55	person walking away giving up disappointed
27	10:55–11:30	old mp3 player retro music / person listening music earphones happy
28	11:30–12:10	antarctica ice expedition extreme
29	12:10–12:30	survival teamwork extreme conditions ice
30	12:30–13:05	flight attendant cheerful airplane cabin happy
31	13:05–13:25	airport ground crew airplane turnaround fast
32	13:25–13:55	open door office inclusive leadership handshake
33	13:55–14:20	military fighter jet pilot
34	14:20–14:55	construction worker laying bricks / grand cathedral architecture
35	14:55–15:20	team brainstorming creative innovation collaboration
36	15:20–15:50	community loyalty support together
37	15:50–16:10	mirror reflection authentic self identity
38	16:10–16:35	confident presentation audience speaking
39	16:35–17:10	remote control tv pause screen living room
40	17:10–17:35	small group early adopters technology
41	17:35–18:00	person watching sunset thinking reflection / seed growing plant timelapse`;

        function parseTimestamp(ts) {
            const [start, end] = ts.split('–');
            const parseTime = (t) => {
                const [min, sec] = t.split(':').map(Number);
                return min * 60 + sec;
            };
            return { start: parseTime(start), end: parseTime(end), duration: parseTime(end) - parseTime(start) };
        }

        function parseData() {
            segments = rawData.split('\n').map(line => {
                const parts = line.trim().split('\t');
                if (parts.length < 3) return null;
                const num = parseInt(parts[0]);
                const timestamp = parseTimestamp(parts[1]);
                const query = parts[2];
                return {
                    num,
                    ...timestamp,
                    query,
                    status: 'pending',
                    videoUrl: null,
                    videoFile: null,
                    duration: timestamp.duration,
                    error: null
                };
            }).filter(s => s !== null);
            
            document.getElementById('totalSegments').textContent = segments.length;
            renderSegments();
        }

        function renderSegments() {
            const container = document.getElementById('segmentsContainer');
            container.innerHTML = segments.map((s, i) => `
                <div class="segment" id="segment-${i}">
                    <div class="segment-num">${s.num}</div>
                    <div class="segment-time">${formatTime(s.start)}–${formatTime(s.end)}</div>
                    <div class="segment-query">${s.query}</div>
                    <div class="segment-status" id="status-${i}">${getStatusHtml(s.status)}</div>
                </div>
            `).join('');
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function getStatusHtml(status) {
            switch(status) {
                case 'pending': return '<span class="status-pending">⏳ Menunggu</span>';
                case 'searching': return '<span class="status-searching">🔍 Mencari...</span>';
                case 'downloading': return '<span class="status-downloading">⬇️ Download...</span>';
                case 'processing': return '<span class="status-downloading">✂️ Memroses...</span>';
                case 'ready': return '<span class="status-ready">✓ Siap</span>';
                case 'error': return '<span class="status-error">✗ Error</span>';
                default: return status;
            }
        }

        function updateSegmentStatus(index, status, error = null) {
            segments[index].status = status;
            if (error) segments[index].error = error;
            
            const statusEl = document.getElementById(`status-${index}`);
            if (statusEl) statusEl.innerHTML = getStatusHtml(status);
            
            updateStats();
        }

        function updateStats() {
            const ready = segments.filter(s => s.status === 'ready').length;
            const processing = segments.filter(s => ['searching', 'downloading', 'processing'].includes(s.status)).length;
            const error = segments.filter(s => s.status === 'error').length;
            
            document.getElementById('readySegments').textContent = ready;
            document.getElementById('processingSegments').textContent = processing;
            document.getElementById('errorSegments').textContent = error;
            
            const progress = ((ready + error) / segments.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${ready}/${segments.length} segmen siap`;
        }

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) {
                alert('Masukkan API Key terlebih dahulu!');
                return;
            }
            apiKey = key;
            localStorage.setItem('pexelsApiKey', key);
            document.getElementById('apiKeyStatus').textContent = '✓ Tersimpan';
            log('API Key disimpan', 'success');
        }

        async function initFFmpeg() {
            if (ffmpeg) return;
            
            // Check for SharedArrayBuffer support (required for FFmpeg WASM)
            if (typeof SharedArrayBuffer === 'undefined') {
                log('SharedArrayBuffer tidak tersedia - perlu server dengan COOP/COEP headers', 'error');
                log('Coba gunakan Firefox atau setting server dengan Cross-Origin-Opener-Policy dan Cross-Origin-Embedder-Policy', 'warning');
                throw new Error('SharedArrayBuffer not supported - need COOP/COEP headers on server');
            }
            
            log('Menginisialisasi FFmpeg...', 'info');
            ffmpeg = new FFmpeg();
            
            ffmpeg.on('log', ({ message }) => {
                console.log('FFmpeg log:', message);
                log(`FFmpeg: ${message}`, 'info');
            });
            
            ffmpeg.on('progress', ({ progress }) => {
                log(`FFmpeg progress: ${Math.round(progress * 100)}%`, 'info');
            });
            
            try {
                await ffmpeg.load({
                    coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.6/dist/umd/ffmpeg-core.js',
                    wasmURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.6/dist/umd/ffmpeg-core.wasm'
                });
                
                log('FFmpeg siap digunakan', 'success');
            } catch (err) {
                log(`Error memuat FFmpeg: ${err.message}`, 'error');
                throw err;
            }
        }

        async function searchVideo(query) {
            // Ambil semua query alternatif (dipisahkan dengan /)
            const queries = query.split('/').map(q => q.trim());
            
            for (const q of queries) {
                try {
                    log(`Mencari: "${q}"`, 'info');
                    
                    const response = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(q)}&per_page=5&orientation=landscape`, {
                        headers: { 'Authorization': apiKey }
                    });
                    
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    
                    const data = await response.json();
                    
                    if (data.videos && data.videos.length > 0) {
                        // Cari video dengan durasi yang sesuai atau bisa dipotong
                        const suitable = data.videos.find(v => v.duration >= 5);
                        if (suitable) {
                            log(`Ditemukan: "${q}" - ${suitable.id}`, 'success');
                            return suitable;
                        }
                    }
                    
                    log(`Tidak ada video cocok untuk: "${q}"`, 'warning');
                } catch (err) {
                    log(`Error mencari "${q}": ${err.message}`, 'error');
                }
            }
            
            return null;
        }

        async function downloadVideo(video, targetDuration) {
            try {
                // Ambil video dengan kualitas terbaik yang tersedia
                const videoFiles = video.video_files.sort((a, b) => b.height - a.height);
                const bestFile = videoFiles[0];
                
                log(`Downloading: ${bestFile.link}`, 'info');
                
                const response = await fetch(bestFile.link);
                if (!response.ok) throw new Error('Download failed');
                
                const blob = await response.blob();
                const arrayBuffer = await blob.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                return { data: uint8Array, originalDuration: video.duration, height: bestFile.height };
            } catch (err) {
                throw new Error(`Download error: ${err.message}`);
            }
        }

        async function processSegment(index) {
            const segment = segments[index];
            
            try {
                updateSegmentStatus(index, 'searching');
                
                // Cari video
                const video = await searchVideo(segment.query);
                if (!video) {
                    throw new Error('Tidak ada video ditemukan untuk query ini');
                }
                
                updateSegmentStatus(index, 'downloading');
                
                // Download video
                const { data, originalDuration, height } = await downloadVideo(video, segment.duration);
                
                updateSegmentStatus(index, 'processing');
                
                // Inisialisasi FFmpeg jika belum
                await initFFmpeg();
                
                // Tulis file ke FFmpeg
                const inputName = `input_${index}.mp4`;
                await ffmpeg.writeFile(inputName, data);
                
                // Hitung waktu potong
                let startTime = 0;
                let endTime = segment.duration;
                
                // Jika video asli lebih panjang dari yang dibutuhkan, potong
                if (originalDuration > segment.duration) {
                    // Ambil dari tengah-tengah video untuk variasi
                    startTime = Math.floor(Math.random() * (originalDuration - segment.duration));
                    endTime = startTime + segment.duration;
                }
                
                // Proses video dengan FFmpeg
                const outputName = `output_${index}.mp4`;
                
                const ffmpegCommand = [
                    '-i', inputName,
                    '-ss', startTime.toString(),
                    '-t', segment.duration.toString(),
                    '-c:v', 'libx264',
                    '-c:a', 'aac',
                    '-preset', 'ultrafast',
                    '-vf', `scale=-2:${Math.min(height, 1080)}`,
                    '-y',
                    outputName
                ];
                
                await ffmpeg.exec(ffmpegCommand);
                
                // Baca hasil
                const outputData = await ffmpeg.readFile(outputName);
                segment.videoFile = outputData;
                segment.videoUrl = URL.createObjectURL(new Blob([outputData.buffer], { type: 'video/mp4' }));
                
                // Cleanup
                await ffmpeg.deleteFile(inputName);
                await ffmpeg.deleteFile(outputName);
                
                updateSegmentStatus(index, 'ready');
                log(`Segment ${segment.num} siap (${segment.duration}s)`, 'success');
                
                return true;
                
            } catch (err) {
                log(`Error segment ${segment.num}: ${err.message}`, 'error');
                updateSegmentStatus(index, 'error', err.message);
                return false;
            }
        }

        async function concatenateVideos() {
            log('Menggabungkan semua video...', 'info');
            
            const readySegments = segments.filter(s => s.status === 'ready');
            
            if (readySegments.length === 0) {
                throw new Error('Tidak ada segmen yang siap!');
            }
            
            // Buat file list untuk FFmpeg
            let concatList = '';
            
            for (let i = 0; i < readySegments.length; i++) {
                const segment = readySegments[i];
                const inputName = `concat_input_${i}.mp4`;
                await ffmpeg.writeFile(inputName, segment.videoFile);
                concatList += `file '${inputName}'\n`;
            }
            
            await ffmpeg.writeFile('concat.txt', concatList);
            
            // Concatenate semua video
            await ffmpeg.exec([
                '-f', 'concat',
                '-safe', '0',
                '-i', 'concat.txt',
                '-c', 'copy',
                '-y',
                'final_output.mp4'
            ]);
            
            // Baca hasil
            const finalData = await ffmpeg.readFile('final_output.mp4');
            
            // Cleanup
            for (let i = 0; i < readySegments.length; i++) {
                await ffmpeg.deleteFile(`concat_input_${i}.mp4`);
            }
            await ffmpeg.deleteFile('concat.txt');
            await ffmpeg.deleteFile('final_output.mp4');
            
            return finalData;
        }

        async function startGeneration() {
            if (!apiKey) {
                alert('Masukkan Pexels API Key terlebih dahulu!');
                return;
            }
            
            if (isProcessing) {
                alert('Proses sedang berjalan!');
                return;
            }
            
            isProcessing = true;
            log('Memulai proses generation video...', 'info');
            
            // Reset semua status
            segments.forEach((_, i) => updateSegmentStatus(i, 'pending'));
            
            let successCount = 0;
            let errorCount = 0;
            
            // Proses setiap segmen satu per satu
            for (let i = 0; i < segments.length; i++) {
                const success = await processSegment(i);
                if (success) successCount++;
                else errorCount++;
                
                // Update progress
                const progress = ((i + 1) / segments.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = `Memproses segmen ${i + 1}/${segments.length}`;
            }
            
            log(`Selesai! Berhasil: ${successCount}, Gagal: ${errorCount}`, successCount > 0 ? 'success' : 'error');
            
            // Coba gabungkan jika ada yang berhasil
            const readySegments = segments.filter(s => s.status === 'ready');
            
            if (readySegments.length > 0) {
                try {
                    const finalVideo = await concatenateVideos();
                    
                    // Tampilkan hasil
                    const blob = new Blob([finalVideo.buffer], { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    
                    const videoEl = document.getElementById('outputVideo');
                    videoEl.src = url;
                    
                    const downloadLink = document.getElementById('downloadLink');
                    downloadLink.href = url;
                    downloadLink.download = 'output_video.mp4';
                    
                    document.getElementById('videoPreview').style.display = 'block';
                    
                    log('Video berhasil digabungkan dan siap di-download!', 'success');
                } catch (err) {
                    log(`Error menggabungkan video: ${err.message}`, 'error');
                }
            } else {
                log('Tidak ada segmen yang berhasil diproses!', 'error');
            }
            
            isProcessing = false;
        }

        function resetAll() {
            if (confirm('Apakah Anda yakin ingin reset semua?')) {
                segments.forEach((_, i) => {
                    segments[i].status = 'pending';
                    segments[i].videoFile = null;
                    segments[i].videoUrl = null;
                    segments[i].error = null;
                });
                
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('progressText').textContent = 'Menunggu...';
                document.getElementById('videoPreview').style.display = 'none';
                document.getElementById('logContainer').innerHTML = '';
                
                renderSegments();
                updateStats();
                
                log('Reset selesai', 'info');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (apiKey) {
                document.getElementById('apiKey').value = apiKey;
                document.getElementById('apiKeyStatus').textContent = '✓ Tersimpan';
            }
            parseData();
            
            // Check FFmpeg availability
            setTimeout(() => {
                if (typeof FFmpeg === 'undefined') {
                    log('FFmpeg tidak terload - Periksa koneksi internet atau coba refresh halaman', 'error');
                } else {
                    log('FFmpeg library tersedia', 'success');
                }
            }, 1000);
        });
    </script>
</body>
</html>
